  <text x="112" y="280" fill="#334155" font-size="28" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" font-weight="600">Monitor the same product across JD, Taobao and Tmall during promotions.</text>
  <text x="112" y="328" fill="#64748B" font-size="24" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">
